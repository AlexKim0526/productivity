<script>

    const REPO_OWNER = "AlexKim0526";
    const REPO_NAME = "process-data";
    const MASTER_DB_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/masterdb.csv`;
    const DATA_FILE = "data.json";

    const MONTH_DISPLAY = ["", "2025-01", "2025-02", "2025-03", "2025-04", "2025-05", "2025-06", "2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12"];

    let masterData = { hierarchy: {}, factories: { "Total": { cat_monthly: {}, item_monthly: {} } }, months: [] };
    let currentSha = "";
    let autoSaveTimer = null;

    // ... (loadMasterDB, parseCSV, addNewProcess 등 기존 UI 함수는 v9.3과 동일) ...
    // [전체 코드가 필요하시면 위 v9.3 코드를 복사하신 후 아래의 save/load 함수만 교체해 주세요]

    // 🚀 [핵심 수정] 한글 인코딩 문제를 해결한 로드 함수
    async function loadConfig() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, { 
                headers: { "Authorization": `token ${GITHUB_TOKEN}` } 
            });
            if (res.ok) {
                const data = await res.json();
                currentSha = data.sha;
                
                // base64 decode 시 한글 깨짐 방지 처리
                const decodedData = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                const config = JSON.parse(decodedData);
                document.getElementById('processList').innerHTML = ''; 
                config.forEach(c => addNewProcess(c.name, c.ratio || 100, c.workTime || 60, c.targets));
                runCalculation();
                document.getElementById('syncStatus').innerText = "✅ 설정 동기화됨";
            } else { addNewProcess(); }
        } catch (e) { 
            console.error("Load Error:", e);
            addNewProcess(); 
        }
    }

    // 🚀 [핵심 수정] 한글 인코딩 문제를 해결한 저장 함수
    async function saveToGitHub() {
        const syncStatus = document.getElementById('syncStatus');
        const config = Array.from(document.querySelectorAll('.process-box')).map(box => ({
            name: box.querySelector('.proc-name-input').value,
            ratio: box.querySelector('.proc-ratio').value,
            workTime: box.querySelector('.proc-time').value,
            targets: Array.from(box.querySelectorAll('.target-row')).map(r => ({ name: r.dataset.name, type: r.dataset.type }))
        }));

        try {
            syncStatus.innerText = "⏳ 저장 중...";
            
            // 한글을 안전하게 Base64로 변환하는 로직 (UTF-8 대응)
            const jsonStr = JSON.stringify(config);
            const base64Content = btoa(encodeURIComponent(jsonStr).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));

            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${GITHUB_TOKEN}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    message: "Update config v9.4 (Fixed Encoding)", 
                    content: base64Content, 
                    sha: currentSha 
                })
            });

            if (!res.ok) throw new Error("GitHub API Response Error");

            const result = await res.json();
            currentSha = result.content.sha;
            syncStatus.innerText = "✅ 저장 완료";
        } catch (e) { 
            console.error("Save Error:", e);
            syncStatus.innerText = "❌ 저장 실패"; 
        }
    }

    // ... (runCalculation 등 나머지 함수 유지) ...
</script>
