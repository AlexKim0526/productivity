<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>팩토리 생산성 통합 분석 시스템 v9.3</title>
    <style>
        :root { --primary: #24292f; --bg: #f6f8fa; --border: #d0d7de; --accent: #2da44e; --blue: #0969da; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); margin: 0; color: #1f2328; font-size: 13px; height: 100vh; overflow: hidden; }
        
        .wrapper { display: flex; flex-direction: column; height: 100vh; }
        .header-bar { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 100; }
        .main-content { display: grid; grid-template-columns: 550px 1fr; gap: 0; flex-grow: 1; overflow: hidden; }
        
        .column { height: 100%; overflow-y: auto; padding: 25px; box-sizing: border-box; border-right: 1px solid var(--border); scroll-behavior: smooth; }
        .column-right { background: white; }

        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 공정 박스 및 아코디언 */
        .process-box { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; background: #fff; border-left: 8px solid var(--blue); overflow: hidden; }
        .proc-header { padding: 12px 15px; background: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .proc-header:hover { background: #f8fafc; }
        .proc-main-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .proc-body { padding: 15px; display: none; background: #fdfdfd; }
        .proc-body.active { display: block; }
        
        .proc-name-input { font-weight: bold; border: 1px solid #cbd5e1; padding: 6px; border-radius: 4px; font-size: 13px; width: 180px; }
        .proc-ratio, .proc-time { width: 50px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; font-weight: bold; padding: 4px; }
        .input-label { font-size: 11px; font-weight: bold; color: #475569; }

        .factory-filter-area { margin-bottom: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; border: 1px solid #bfdbfe; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 50; }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid var(--border); padding: 10px 6px; text-align: center; vertical-align: middle; }
        th { background: #f6f8fa; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); }
        .col-total { background: #fff8c5; font-weight: bold; border-left: 2px solid #d4a017; }
        .manpower-bold { font-weight: 900; font-size: 13px; color: #000; }
        .sub-qty { font-size: 10px; color: #64748b; display: block; margin-top: 3px; font-weight: normal; }
        
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--accent); color: white; }
        .btn-del { color: #ef4444; background: none; font-size: 18px; font-weight: bold; padding: 0 5px; cursor: pointer; }

        .item-scroll { max-height: 180px; overflow-y: auto; border: 1px solid #ddd; margin-top: 10px; padding: 8px; border-radius: 4px; background: #fff; }
        .target-row { display: flex; justify-content: space-between; align-items: center; background: #f3f4f6; padding: 6px 12px; border-radius: 5px; margin-bottom: 4px; }
        .item-name-text { font-size: 11px; font-weight: 600; color: #0969da; }
        .cat-name-text { font-size: 11px; font-weight: 600; color: #1a7f37; }
        .toggle-arrow { font-size: 12px; color: #666; transition: transform 0.2s; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-bar">
        <div><strong>🚀 팩토리 생산성 시뮬레이터 v9.3</strong> <span id="dbStatus" style="margin-left:15px; font-size:11px; color:#94d3a2;">DB 연결 대기...</span></div>
        <div><span id="syncStatus" style="font-size:11px; margin-right:15px;">GitHub 상태 대기</span><button class="btn btn-green" onclick="saveToGitHub()">💾 설정 저장</button></div>
    </div>

    <div class="main-content">
        <div class="column">
            <h2>🛠️ 공정 및 대상 설정</h2>
            <div id="processList"></div>
            <button class="btn btn-blue" style="width:100%; margin-bottom:20px; font-size:14px; padding:12px;" onclick="addNewProcess()">+ 새로운 공정 추가</button>
            
            <div class="card">
                <h3>📅 기본 가동 환경</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><label class="input-label">월 근무일 (일)</label><input type="number" id="cfgDays" value="22" onchange="runCalculation()" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;"></div>
                    <div><label class="input-label">일 근무시간 (h)</label><input type="number" id="cfgHours" value="8" onchange="runCalculation()" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;"></div>
                </div>
                <button class="btn btn-blue" style="width:100%; background:#24292f; margin-top:15px; padding:12px;" onclick="runCalculation()">⚡ 분석 결과 업데이트</button>
            </div>
        </div>

        <div class="column column-right">
            <h2>📊 월별 투입인원 분석</h2>
            
            <div class="factory-filter-area">
                <label style="font-weight: 800; color: #1e40af;">🔍 분석 공장 선택:</label>
                <select id="factorySelector" style="padding:8px 15px; border-radius:6px; border:2px solid var(--blue); font-weight:bold;" onchange="runCalculation()">
                    <option value="Total">전체 합계 (Total)</option>
                </select>
                <span style="font-size:11px; color:#64748b; margin-left:auto;">* 물량 수치는 <strong>일평균 처리건수</strong> 기준입니다.</span>
            </div>

            <table id="resultTable">
                <thead id="tableHead"></thead>
                <tbody id="resultBody">
                    <tr><td colspan="10" style="padding:150px; color:#999;">Master DB를 로드하는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 🔐 GitHub 인증 정보
    const GITHUB_TOKEN = "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";
    const REPO_OWNER = "AlexKim0526";
    const REPO_NAME = "process-data";
    const MASTER_DB_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/masterdb.csv`;
    const DATA_FILE = "data.json";

    const MONTH_DISPLAY = ["", "2025-01", "2025-02", "2025-03", "2025-04", "2025-05", "2025-06", "2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12"];

    let masterData = { hierarchy: {}, factories: { "Total": { cat_monthly: {}, item_monthly: {} } }, months: [] };
    let currentSha = "";
    let autoSaveTimer = null;

    async function loadMasterDB() {
        try {
            const res = await fetch(`${MASTER_DB_URL}?t=${new Date().getTime()}`);
            const text = await res.text();
            parseCSV(text);
            document.getElementById('dbStatus').innerText = "✅ DB 연결됨";
            loadConfig(); 
        } catch (e) { document.getElementById('dbStatus').innerText = "❌ DB 로드 실패"; }
    }

    function parseCSV(csv) {
        const lines = csv.split(/\r?\n/);
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const tempMonths = new Set();
        const foundFactories = new Set();

        lines.slice(1).forEach(line => {
            if (!line.trim()) return;
            const cols = line.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            const cat = cols[1], item = cols[2], fName = cols[3], qty = parseFloat(cols[4]) || 0, seq = parseInt(cols[5]) || 0;
            const mStr = MONTH_DISPLAY[seq] || "Unknown";

            if (seq > 0 && cat && item) {
                tempMonths.add(mStr);
                foundFactories.add(fName);
                if (!masterData.hierarchy[cat]) masterData.hierarchy[cat] = new Set();
                masterData.hierarchy[cat].add(item);
                if (!masterData.factories[fName]) masterData.factories[fName] = { cat_monthly: {}, item_monthly: {} };
                const update = (target) => {
                    const f = masterData.factories[target];
                    if (!f.cat_monthly[mStr]) f.cat_monthly[mStr] = {};
                    f.cat_monthly[mStr][cat] = (f.cat_monthly[mStr][cat] || 0) + qty;
                    if (!f.item_monthly[mStr]) f.item_monthly[mStr] = {};
                    f.item_monthly[mStr][item] = (f.item_monthly[mStr][item] || 0) + qty;
                };
                update("Total"); update(fName);
            }
        });
        masterData.months = Array.from(tempMonths).sort((a, b) => MONTH_DISPLAY.indexOf(a) - MONTH_DISPLAY.indexOf(b));
        const selector = document.getElementById('factorySelector');
        Array.from(foundFactories).sort().forEach(f => {
            const opt = document.createElement('option'); opt.value = f; opt.textContent = f; selector.appendChild(opt);
        });
        for (let cat in masterData.hierarchy) masterData.hierarchy[cat] = Array.from(masterData.hierarchy[cat]).sort();
    }

    function addNewProcess(name = "", ratio = 100, workTime = 60, targets = []) {
        const container = document.getElementById('processList');
        const div = document.createElement('div');
        div.className = 'process-box';
        let catOpts = `<option value="">-- 대분류 선택 --</option>`;
        Object.keys(masterData.hierarchy).sort().forEach(cat => { catOpts += `<option value="${cat}">${cat}</option>`; });

        div.innerHTML = `
            <div class="proc-header" onclick="toggleAccordion(this)">
                <div class="proc-main-info" onclick="event.stopPropagation()">
                    <input type="text" class="proc-name-input" value="${name || '신규 공정'}" onchange="triggerAutoSave()">
                    <div style="background:#fff7ed; padding:4px 8px; border-radius:6px; border:1px solid #ffedd5; font-size:11px;">
                        물량비중: <input type="number" class="proc-ratio" value="${ratio}" onchange="triggerAutoSave(); runCalculation();"> %
                    </div>
                    <div style="background:#f0f9ff; padding:4px 10px; border-radius:6px; border:1px solid #bae6fd; font-size:11px;">
                        단위 작업시간: <input type="number" class="proc-time" value="${workTime}" onchange="triggerAutoSave(); runCalculation();"> 초
                    </div>
                </div>
                <span class="toggle-arrow">▼</span>
            </div>
            <div class="proc-body">
                <div class="selector-section" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #e2e8f0;">
                    <label class="input-label">1. 대상 품목 지정</label>
                    <select class="cat-sel" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd; margin:8px 0;">${catOpts}</select>
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-blue" style="flex:1;" onclick="addTarget(this, 'cat')">대분류 전체 추가</button>
                        <button class="btn" style="flex:1; background:#64748b; color:white;" onclick="toggleItemScroll(this)">품목 개별 선택</button>
                    </div>
                    <div class="item-scroll" style="display:none;"></div>
                    <button class="btn btn-green item-add-btn" style="width:100%; display:none; margin-top:10px;" onclick="addTarget(this, 'item')">선택된 품목 추가</button>
                </div>
                <div class="target-list" style="margin-top:20px; border-top:2px solid #f1f5f9; padding-top:15px;">
                    <label class="input-label" style="color:#64748b; margin-bottom:10px; display:block;">등록된 대상목록 & 작업시간(초)</label>
                </div>
                <button class="btn" style="width:100%; margin-top:20px; color:#ef4444; background:#fff1f2; border:1px solid #fecaca;" onclick="if(confirm('삭제할까요?')) { this.closest('.process-box').remove(); triggerAutoSave(); }">공정 삭제</button>
            </div>
        `;
        container.appendChild(div);
        if (targets.length > 0) targets.forEach(t => createTargetRow(div.querySelector('.target-list'), t.name, t.type));
    }

    function toggleAccordion(header) {
        const body = header.nextElementSibling;
        const arrow = header.querySelector('.toggle-arrow');
        const isActive = body.classList.toggle('active');
        arrow.innerText = isActive ? "▲" : "▼";
    }

    function toggleItemScroll(btn) {
        const box = btn.closest('.process-box');
        const cat = box.querySelector('.cat-sel').value;
        const scroll = box.querySelector('.item-scroll');
        const addBtn = box.querySelector('.item-add-btn');
        if(!cat) { alert('대분류를 먼저 선택하세요'); return; }
        scroll.innerHTML = '';
        masterData.hierarchy[cat].forEach(item => {
            scroll.innerHTML += `<label style="display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:11px; cursor:pointer;"><input type="checkbox" value="${item}"> ${item}</label>`;
        });
        scroll.style.display = 'block'; addBtn.style.display = 'block';
    }

    function addTarget(btn, type) {
        const box = btn.closest('.process-box'), list = box.querySelector('.target-list');
        const cat = box.querySelector('.cat-sel').value;
        if (type === 'cat') { if(!cat) return; createTargetRow(list, cat, 'cat'); }
        else { box.querySelectorAll('.item-scroll input:checked').forEach(cb => createTargetRow(list, cb.value, 'item')); }
        triggerAutoSave(); runCalculation();
    }

    function createTargetRow(container, name, type) {
        if ([...container.querySelectorAll('.target-row')].some(r => r.dataset.name === name)) return;
        const div = document.createElement('div');
        div.className = 'target-row'; div.dataset.name = name; div.dataset.type = type;
        const nameClass = type === 'cat' ? 'cat-name-text' : 'item-name-text';
        div.innerHTML = `<span class="${nameClass}">${name}</span>
            <button class="btn-del" onclick="this.parentElement.remove(); triggerAutoSave(); runCalculation();">×</button>`;
        container.appendChild(div);
    }

    function runCalculation() {
        const days = parseFloat(document.getElementById('cfgDays').value) || 22;
        const hours = parseFloat(document.getElementById('cfgHours').value) || 8;
        const availSec = days * hours * 3600;
        const fKey = document.getElementById('factorySelector').value;
        const source = masterData.factories[fKey];
        if(!source) return;

        const processes = Array.from(document.querySelectorAll('.process-box')).map(box => ({
            name: box.querySelector('.proc-name-input').value,
            ratio: (parseFloat(box.querySelector('.proc-ratio').value) || 0) / 100,
            workTime: parseFloat(box.querySelector('.proc-time').value) || 0,
            targets: Array.from(box.querySelectorAll('.target-row')).map(r => ({ name: r.dataset.name, type: r.dataset.type }))
        }));

        const head = document.getElementById('tableHead');
        let hHtml = `<tr><th>작업월</th><th>월 총물량</th><th>일평균 물량</th>`;
        processes.forEach(p => { hHtml += `<th>${p.name}</th>`; });
        hHtml += `<th class="col-total">총 인원</th></tr>`;
        head.innerHTML = hHtml;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        masterData.months.forEach(m => {
            let monthTotal = 0; const cats = source.cat_monthly[m] || {};
            for(let c in cats) monthTotal += cats[c];
            let rowHtml = `<tr><td style="font-weight:bold;">${m}</td><td>${Math.round(monthTotal).toLocaleString()}</td><td style="color:#0969da; font-weight:bold;">${Math.round(monthTotal/days).toLocaleString()}</td>`;
            let totalMan = 0;
            processes.forEach(p => {
                let pQty = 0;
                p.targets.forEach(t => {
                    const q = (t.type === 'cat') ? (cats[t.name] || 0) : (source.item_monthly[m][t.name] || 0);
                    pQty += q;
                });
                const man = (pQty * p.ratio * p.workTime) / availSec;
                const dailyQty = (pQty * p.ratio) / days;
                rowHtml += `<td><span class="manpower-bold">${man.toFixed(1)}명</span><br><span class="sub-qty">(${Math.round(dailyQty).toLocaleString()}건/일)</span></td>`;
                totalMan += man;
            });
            rowHtml += `<td class="col-total"><span class="manpower-bold">${totalMan.toFixed(1)}명</span></td></tr>`;
            tbody.innerHTML += rowHtml;
        });
    }

    async function loadConfig() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            if (res.ok) {
                const data = await res.json(); currentSha = data.sha;
                const config = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                document.getElementById('processList').innerHTML = ''; 
                config.forEach(c => addNewProcess(c.name, c.ratio || 100, c.workTime || 60, c.targets));
                runCalculation();
            } else { addNewProcess(); }
        } catch (e) { addNewProcess(); }
    }

    async function saveToGitHub() {
        const syncStatus = document.getElementById('syncStatus');
        const config = Array.from(document.querySelectorAll('.process-box')).map(box => ({
            name: box.querySelector('.proc-name-input').value,
            ratio: box.querySelector('.proc-ratio').value,
            workTime: box.querySelector('.proc-time').value,
            targets: Array.from(box.querySelectorAll('.target-row')).map(r => ({ name: r.dataset.name, type: r.dataset.type }))
        }));
        try {
            syncStatus.innerText = "⏳ 저장 중...";
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${DATA_FILE}`, {
                method: "PUT", headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update v9.3 UI", content: btoa(unescape(encodeURIComponent(JSON.stringify(config)))), sha: currentSha })
            });
            const result = await res.json(); currentSha = result.content.sha;
            syncStatus.innerText = "✅ 저장 완료";
        } catch (e) { syncStatus.innerText = "❌ 저장 실패"; }
    }

    function triggerAutoSave() { if(autoSaveTimer) clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(saveToGitHub, 3000); }

    window.onload = loadMasterDB;
</script>
</body>
</html>
